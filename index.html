<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Day Planner </title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, #ffe6f2, #e6f2ff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 550px;
            width: 100%;
            text-align: center;
            transition: all 0.3s ease;
        }
        header h1 { color: #d63384; margin-bottom: 8px; font-size: 1.6rem; }
        header p { color: #666; margin-bottom: 20px; font-size: 0.95rem; }
        
        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab {
            padding: 10px 18px;
            border: none;
            background: #f8f9fa;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
            font-weight: 500;
        }
        .tab.active { background: #d63384; color: white; transform: scale(1.05); }
        .tab:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .options-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
            min-height: 120px;
        }
        .option-card {
            background: #fff0f6;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 15px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .option-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .option-card.selected { border-color: #d63384; background: #ffe6f2; font-weight: 600; }
        .selected-tag { font-size: 0.75rem; color: #d63384; background: #fff; padding: 2px 6px; border-radius: 8px; margin-top: 4px; }
        
        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            align-self: flex-start;
            margin-bottom: 12px;
            transition: 0.2s;
        }
        .back-btn:hover { background: #5a6268; }
        
        .sub-title { font-size: 1.1rem; color: #333; font-weight: 600; margin-bottom: 12px; }
        
        .restaurant-list, .cinema-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }
        .restaurant-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .restaurant-card:hover, .cinema-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border-color: #d63384;
        }
        .restaurant-card.selected, .cinema-card.selected { 
            border-color: #d63384; 
            border-width: 3px;
        }
        .restaurant-card.selected::after, .cinema-card.selected::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 8px;
            background: #d63384;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            z-index: 2;
        }
        .restaurant-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
        }
        .restaurant-name {
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            background: white;
        }
        .view-photo-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(214, 51, 132, 0.9);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;
            transition: 0.3s;
            z-index: 1;
        }
        .restaurant-card:hover .view-photo-btn { opacity: 1; }
        
        .cinema-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 3px solid transparent;
            border-radius: 12px;
            padding: 25px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .cinema-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 25px rgba(102, 126, 234, 0.4);
        }
        .cinema-card.selected {
            border-color: #ffd700;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .cinema-icon { font-size: 40px; }
        .cinema-name { font-size: 18px; font-weight: 700; }
        .cinema-hint { font-size: 0.75rem; opacity: 0.9; }
        
        .custom-input-group { margin-top: 15px; display: flex; gap: 8px; align-items: center; }
        .custom-input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.2s;
        }
        .custom-input:focus { border-color: #d63384; outline: none; }
        .add-custom-btn {
            background: #d63384;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
        }
        
        #submit-btn {
            background: #d63384;
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
            letter-spacing: 0.5px;
            width: 100%;
            margin-top: 10px;
        }
        #submit-btn:disabled { background: #ccc; cursor: not-allowed; opacity: 0.7; }
        
        .result, .whatsapp-form {
            margin-top: 20px;
            padding: 20px;
            background: #e6f2ff;
            border-radius: 12px;
            animation: fadeIn 0.4s ease;
            text-align: left;
        }
        .result.hidden, .whatsapp-form.hidden { display: none; }
        
        .form-group { margin: 15px 0; text-align: left; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.2s;
        }
        .form-group input:focus { border-color: #d63384; outline: none; }
        .form-hint { font-size: 0.8rem; color: #666; margin-top: 4px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .btn-primary {
            background: #d63384;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
            min-width: 120px;
            transition: 0.3s;
        }
        .btn-primary:hover { background: #b3246b; transform: scale(1.02); }
        .btn-secondary {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
            min-width: 120px;
            transition: 0.3s;
        }
        .btn-secondary:hover { background: #5a6268; }
        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-whatsapp:hover { background: #128C7E; transform: scale(1.02); }
        
        #result-list { list-style: none; margin: 15px 0; }
        #result-list li { margin: 10px 0; color: #333; font-size: 15px; padding: 8px 0; border-bottom: 1px dashed #cbd5e0; }
        #result-list li:last-child { border-bottom: none; }
        #result-list strong { color: #d63384; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 450px) {
            .container { padding: 18px; }
            .tab { padding: 8px 12px; font-size: 14px; }
            .options-container { grid-template-columns: repeat(2, 1fr); }
            .restaurant-list, .cinema-list { grid-template-columns: repeat(2, 1fr); }
            .restaurant-img { height: 100px; }
            .view-photo-btn { opacity: 1; bottom: 35px; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>What's the plan today ?</h1>
            <p>Pick one from each. I'll handle the rest!</p>
        </header>

        <nav class="tabs">
            <button class="tab active" data-category="eat">🍽️ Eat</button>
            <button class="tab" data-category="go">📍 Go</button>
            <button class="tab" data-category="outfit">👗 Outfit</button>
        </nav>

        <main class="options-container" id="options-container"></main>

        <button id="submit-btn" disabled>✨ Confirm Choices ✨</button>

        <!-- Result Summary (Step 1) -->
        <div id="result" class="result hidden">
            <h2 style="text-align:center;color:#d63384;">✨ Perfect! Review Your Plan ✨</h2>
            <ul id="result-list"></ul>
            
            <div class="btn-group">
                <button id="edit-btn" class="btn-secondary">✏️ Edit Choices</button>
                <button id="next-btn" class="btn-primary">Next → 📱</button>
            </div>
        </div>

        <!-- WhatsApp Form (Step 2) -->
        <div id="whatsapp-form" class="whatsapp-form hidden">
            <h2 style="text-align:center;color:#25D366;">📱 Send via WhatsApp</h2>
            <p style="margin:10px 0;color:#666;font-size:0.9rem;text-align:center;">Enter details to send the plan:</p>
            
            <div class="form-group">
                <label for="plan-date">📅 Date & Time</label>
                <input type="datetime-local" id="plan-date" required>
                <div class="form-hint">When is your date?</div>
            </div>
            
            <div class="form-group">
                <label for="phone-number">📞 WhatsApp Number</label>
                <input type="tel" id="phone-number" placeholder="e.g. 60123456789" pattern="[0-9]{10,15}" required>
                <div class="form-hint">Country code + number, no + or spaces (e.g. 60123456789)</div>
            </div>
            
            <button id="whatsapp-send-btn" class="btn-whatsapp">
                💬 Send Plan via WhatsApp
            </button>
            
            <div class="btn-group" style="margin-top:10px;">
                <button id="back-to-result" class="btn-secondary">← Back to Review</button>
                <button id="reset-from-whatsapp" class="btn-secondary">🔄 Start Over</button>
            </div>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:1000;justify-content:center;align-items:center;padding:20px;">
        <button onclick="closeLightbox()" style="position:absolute;top:20px;right:30px;color:white;font-size:40px;cursor:pointer;background:none;border:none;">&times;</button>
        <img id="lightbox-img" src="" alt="" style="max-width:90%;max-height:85vh;object-fit:contain;border-radius:10px;">
        <div id="lightbox-caption" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:white;font-size:18px;background:rgba(0,0,0,0.6);padding:10px 20px;border-radius:20px;"></div>
    </div>

    <script>
        // 👇 FOOD DATA
        const foodData = {
            "☕ Cute Café": [
                { name: "Irene", img: "https://images.eatdrinkkl.com/store/postimage/68931/image/webp_version-dd364e1b3ec7ee7491f33ad02aef988b.webp" },
                { name: "Octane", img: "https://images.eatdrinkkl.com/store/postimage/11334/image/%5B:original%2C%20:original%5D-3b48847ffafc3b552189df5f070dbea0.jpg" },
                { name: "Eternyl Vinyl", img: "https://images.lifestyleasia.com/wp-content/uploads/sites/5/2025/08/15110703/Eternyl-Hero-1200x900.jpg" },
            ],
            "🤤 Buffet": [
                { name: "Suki-ya", img: "https://www.suki-ya.com/pic/about/gfx_about.jpg" },
                { name: "BBQ Town", img: "https://dynamic-media-cdn.tripadvisor.com/media/photo-o/21/fe/cb/8b/bbq-town-in-mid-valley.jpg" },
                { name: "JomAmigo", img: "https://www.ioicitymall.com.my/data/images/item/2024/img_4015685_slide2.jpg" }	    
            ],
            "❓CUSTOM": []
        };

        const cinemaData = {
            "GSC": { url: "https://www.gsc.com.my/", icon: "🎬", hint: "Book now" },
            "TGV": { url: "https://www.tgv.com.my/", icon: "🎥", hint: "Book now" }
        };

        const categories = {
            go: ["🎬 Movies", "🌳 Park Walk"],
            outfit: ["👖 Casual", "🧥 Cozy/Comfy", "👟 Sporty"]
        };

        // State
        const selections = { eat: null, go: null, outfit: null };
        let currentCategory = 'eat';
        let viewState = 'main';
        let subType = null;
        let activeFoodType = null;

        // DOM Elements
        const tabs = document.querySelectorAll('.tab');
        const optionsContainer = document.getElementById('options-container');
        const submitBtn = document.getElementById('submit-btn');
        const resultDiv = document.getElementById('result');
        const resultList = document.getElementById('result-list');
        const editBtn = document.getElementById('edit-btn');
        const nextBtn = document.getElementById('next-btn');
        const whatsappForm = document.getElementById('whatsapp-form');
        const whatsappSendBtn = document.getElementById('whatsapp-send-btn');
        const backToResultBtn = document.getElementById('back-to-result');
        const resetFromWhatsappBtn = document.getElementById('reset-from-whatsapp');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption');

        // Lightbox
        function openLightbox(imgSrc, caption) {
            lightboxImg.src = imgSrc;
            lightboxCaption.textContent = caption;
            lightbox.style.display = 'flex';
        }
        function closeLightbox() { lightbox.style.display = 'none'; }
        lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

        function renderView() {
            optionsContainer.innerHTML = '';
            optionsContainer.style.display = viewState === 'main' ? 'grid' : 'block';
            if (viewState === 'sub') {
                if (subType === 'food') renderRestaurantSubView();
                else if (subType === 'cinema') renderCinemaSubView();
            } else {
                renderMainGrid();
            }
            checkCompletion();
        }

        function renderMainGrid() {
            const items = currentCategory === 'eat' ? Object.keys(foodData) : categories[currentCategory];
            items.forEach(item => {
                const card = document.createElement('div');
                const isSelected = selections[currentCategory]?.startsWith(item);
                card.className = `option-card ${isSelected ? 'selected' : ''}`;
                let selectedText = '';
                if (isSelected) {
                    const parts = selections[currentCategory].split(' at ');
                    selectedText = parts[1] ? `<span class="selected-tag">✅ ${parts[1]}</span>` : '';
                }
                card.innerHTML = `<span>${item}</span>${selectedText}`;
                card.addEventListener('click', () => {
                    if (currentCategory === 'eat') {
                        if (item === "❓CUSTOM") {
                            activeFoodType = "Custom Place";
                            subType = 'food';
                            viewState = 'sub';
                            renderView();
                            setTimeout(() => document.getElementById('custom-input')?.focus(), 100);
                        } else {
                            activeFoodType = item;
                            subType = 'food';
                            viewState = 'sub';
                            renderView();
                        }
                    } else if (item === "🎬 Movies") {
                        subType = 'cinema';
                        viewState = 'sub';
                        renderView();
                    } else {
                        selectOption(item);
                    }
                });
                optionsContainer.appendChild(card);
            });
        }

        function renderRestaurantSubView() {
            const backBtn = document.createElement('button');
            backBtn.className = 'back-btn';
            backBtn.textContent = '← Back to Food Types';
            backBtn.addEventListener('click', () => { viewState = 'main'; renderView(); });
            optionsContainer.appendChild(backBtn);

            const title = document.createElement('div');
            title.className = 'sub-title';
            title.textContent = activeFoodType === "Custom Place" ? "Enter your custom place:" : `Where for ${activeFoodType}?`;
            optionsContainer.appendChild(title);

            if (activeFoodType !== "Custom Place" && foodData[activeFoodType]?.length > 0) {
                const listDiv = document.createElement('div');
                listDiv.className = 'restaurant-list';
                foodData[activeFoodType].forEach(restaurant => {
                    const card = document.createElement('div');
                    const fullName = `${activeFoodType} at ${restaurant.name}`;
                    card.className = `restaurant-card ${selections.eat === fullName ? 'selected' : ''}`;
                    card.innerHTML = `
                        <img src="${restaurant.img}" alt="${restaurant.name}" class="restaurant-img" onerror="this.src='https://via.placeholder.com/400x300?text=No+Photo'">
                        <button class="view-photo-btn" onclick="event.stopPropagation(); openLightbox('${restaurant.img}', '${restaurant.name}')">📷 View</button>
                        <div class="restaurant-name">${restaurant.name}</div>
                    `;
                    card.addEventListener('click', () => selectRestaurant(restaurant.name));
                    listDiv.appendChild(card);
                });
                optionsContainer.appendChild(listDiv);
            }
            createCustomInput('food');
        }

        function renderCinemaSubView() {
            const backBtn = document.createElement('button');
            backBtn.className = 'back-btn';
            backBtn.textContent = '← Back to Activities';
            backBtn.addEventListener('click', () => { viewState = 'main'; renderView(); });
            optionsContainer.appendChild(backBtn);

            const title = document.createElement('div');
            title.className = 'sub-title';
            title.textContent = "Choose your cinema:";
            optionsContainer.appendChild(title);

            const listDiv = document.createElement('div');
            listDiv.className = 'cinema-list';
            for (const [name, data] of Object.entries(cinemaData)) {
                const card = document.createElement('div');
                const isSelected = selections.go === `🎬 Movies at ${name}`;
                card.className = `cinema-card ${isSelected ? 'selected' : ''}`;
                card.innerHTML = `
                    <span class="cinema-icon">${data.icon}</span>
                    <span class="cinema-name">${name}</span>
                    <span class="cinema-hint">${data.hint} →</span>
                `;
                card.addEventListener('click', () => {
                    window.open(data.url, '_blank');
                    selections.go = `🎬 Movies at ${name}`;
                    viewState = 'main';
                    renderView();
                });
                listDiv.appendChild(card);
            }
            optionsContainer.appendChild(listDiv);
            createCustomInput('cinema');
        }

        function createCustomInput(type) {
            const inputGroup = document.createElement('div');
            inputGroup.className = 'custom-input-group';
            inputGroup.innerHTML = `
                <input type="text" class="custom-input" id="custom-input" placeholder="Type another place...">
                <button class="add-custom-btn" id="add-custom-btn">Add</button>
            `;
            optionsContainer.appendChild(inputGroup);
            const addBtn = document.getElementById('add-custom-btn');
            const input = document.getElementById('custom-input');
            const handleAdd = () => {
                const val = input.value.trim();
                if (val.length > 0) {
                    const key = type === 'food' ? 'eat' : 'go';
                    const prefix = type === 'food' ? (activeFoodType === "Custom Place" ? "Custom Food" : activeFoodType) : "🎬 Movies";
                    selections[key] = `${prefix} at ${val}`;
                    viewState = 'main';
                    renderView();
                } else {
                    input.style.borderColor = '#ff4d4d';
                    setTimeout(() => input.style.borderColor = '#ddd', 1000);
                }
            };
            addBtn.addEventListener('click', handleAdd);
            input.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAdd(); });
        }

        function selectRestaurant(name) {
            selections.eat = `${activeFoodType} at ${name}`;
            viewState = 'main';
            renderView();
        }

        function selectOption(option) {
            selections[currentCategory] = option;
            renderView();
        }

        function checkCompletion() {
            const allSelected = Object.values(selections).every(val => val !== null);
            submitBtn.disabled = !allSelected;
        }

        function buildResultHTML() {
            resultList.innerHTML = '';
            for (const [cat, val] of Object.entries(selections)) {
                const li = document.createElement('li');
                if (cat === 'eat') {
                    const [food, place] = val.split(' at ');
                    li.innerHTML = `<strong>🍽️ Food:</strong> ${food}<br><strong>📍 Place:</strong> ${place}`;
                } else if (cat === 'go') {
                    if (val.includes('Movies')) {
                        const [activity, place] = val.split(' at ');
                        li.innerHTML = `<strong>🎬 Activity:</strong> ${activity}<br><strong>🎟️ Cinema:</strong> ${place}`;
                    } else {
                        li.innerHTML = `<strong>📍 Activity:</strong> ${val}`;
                    }
                } else {
                    li.innerHTML = `<strong>👗 Outfit:</strong> ${val}`;
                }
                resultList.appendChild(li);
            }
        }

        function showResult() {
            buildResultHTML();
            // Hide selection UI, show result summary
            optionsContainer.style.display = 'none';
            document.querySelector('.tabs').style.display = 'none';
            submitBtn.style.display = 'none';
            resultDiv.classList.remove('hidden');
            whatsappForm.classList.add('hidden');
        }

        function showWhatsAppForm() {
            resultDiv.classList.add('hidden');
            whatsappForm.classList.remove('hidden');
            
            // Set default date to tomorrow 7 PM
            const defaultDate = new Date();
            defaultDate.setDate(defaultDate.getDate() + 1);
            defaultDate.setHours(19, 0, 0, 0);
            document.getElementById('plan-date').value = defaultDate.toISOString().slice(0, 16);
        }

        function sendToWhatsApp() {
            const phoneInput = document.getElementById('phone-number').value.trim();
            const dateInput = document.getElementById('plan-date').value;
            
            if (!/^[0-9]{10,15}$/.test(phoneInput)) {
                alert('⚠️ Please enter a valid phone number (10-15 digits, no + or spaces)\nExample: 60123456789');
                document.getElementById('phone-number').focus();
                return;
            }
            if (!dateInput) {
                alert('⚠️ Please select a date & time');
                return;
            }
            
            const dateObj = new Date(dateInput);
            const formattedDate = dateObj.toLocaleString('en-MY', { 
                weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' 
            });
            
            let message = `💕 *Our Date Plan* 💕\n\n`;
            message += `📅 *When:* ${formattedDate}\n\n`;
            
            for (const [cat, val] of Object.entries(selections)) {
                if (cat === 'eat') {
                    const [food, place] = val.split(' at ');
                    message += `🍽️ *Food:* ${food}\n📍 *Place:* ${place}\n\n`;
                } else if (cat === 'go') {
                    if (val.includes('Movies')) {
                        const [activity, place] = val.split(' at ');
                        message += `🎬 *Activity:* ${activity}\n🎟️ *Cinema:* ${place}\n\n`;
                    } else {
                        message += `📍 *Activity:* ${val}\n\n`;
                    }
                } else {
                    message += `👗 *Outfit:* ${val}\n\n`;
                }
            }
            message += `\nCan't wait! 😊💖`;
            
            const whatsappURL = `https://wa.me/${phoneInput}?text=${encodeURIComponent(message)}`;
            window.open(whatsappURL, '_blank');
            
            setTimeout(() => {
                if (confirm('✅ Plan sent! Start a new plan?')) {
                    resetAll();
                }
            }, 1000);
        }

        function resetAll() {
            for (const key in selections) selections[key] = null;
            currentCategory = 'eat';
            viewState = 'main';
            subType = null;
            activeFoodType = null;
            tabs.forEach(t => t.classList.remove('active'));
            tabs[0].classList.add('active');
            renderView();
            resultDiv.classList.add('hidden');
            whatsappForm.classList.add('hidden');
            optionsContainer.style.display = 'grid';
            document.querySelector('.tabs').style.display = 'flex';
            submitBtn.style.display = 'inline-block';
        }

        // Event Listeners
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                if (tab.disabled) return;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentCategory = tab.dataset.category;
                if (viewState === 'sub') viewState = 'main';
                renderView();
            });
        });

        submitBtn.addEventListener('click', showResult);
        editBtn.addEventListener('click', resetAll); // Go back to edit
        nextBtn.addEventListener('click', showWhatsAppForm); // Proceed to WhatsApp
        backToResultBtn.addEventListener('click', () => {
            whatsappForm.classList.add('hidden');
            resultDiv.classList.remove('hidden');
        });
        resetFromWhatsappBtn.addEventListener('click', resetAll);
        whatsappSendBtn.addEventListener('click', sendToWhatsApp);

        // Initialize
        renderView();
    </script>
</body>
</html>
